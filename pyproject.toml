[tool.uv.workspace]
members = ["apps/api"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "A", "C4", "PT", "SIM", "TCH"]
ignore = ["E501"]

[tool.pytest.ini_options]
addopts = "-ra -q --strict-markers"
testpaths = ["apps/api/tests"]
asyncio_mode = "auto"
